version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      DATABASE_URL: sqlite:///./barberia.db
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_prod}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://100.48.11.7:5173"]'
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

